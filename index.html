os encallaban, los encendedores fantasma recogían los restos del naufragio y transportaban sus bienes saqueados a [[Baldurlogseq____&apos;s Gate]], ubicado en la orilla norte de un recodo del río [[Chionthar]], y vendían su botín. En los años transcurridos desde entonces, [[Baldurlogseq____&apos;s Gate]] se ha convertido en una ciudad amurallada. Hoy en día, sus calles brumosas se tiñen de rojo con la sangre de los desafortunados que caen presa de malvados oportunistas, muchos de los cuales se consideran nobles, comerciantes, piratas y asesinos. Un ejército de soldados mercenarios llamados “ [[Flaming Fist]] ” mantiene el orden en la ciudad, y estos soldados responden al Gran Duque [[Ulder Ravengard]]. A los miembros del [Puño Flamígero]([[Flaming Fist]]) no les importa la justicia; Anhelan el poder y la moneda, nada más. Pero a pesar de la reputación de crueldad del [Puño]([[Flaming Fist]]), el Gran Duque es ampliamente considerado como un hombre honorable y razonable.logseq____&quot;,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Flogseq____&quot;,718,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Xlogseq____&quot;,633,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Vlogseq____&quot;,718,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Ulogseq____&quot;,633,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Ulogseq____&quot;,700,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Ulogseq____&quot;,702,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Ulogseq____&quot;,703,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Hlogseq____&quot;,633,536870955]],[logseq____&quot;^15logseq____&quot;,[716,logseq____&quot;^Hlogseq____&quot;,700,536870955]],[logseq____&quot;^15logse       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + (q.p || '') +
              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
          }
        }
      }(window.location))</script>
